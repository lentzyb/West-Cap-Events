<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Event Registration</title><link rel="stylesheet" href="/styles.css"></head>
<body><main class="form-shell"><section class="card"><div class="brand-mark">W</div><p class="eyebrow">WEST CAPITAL LENDING</p><div id="eventLoading">Loading event…</div>
<div id="eventContent" hidden><h1 id="eventName"></h1><div id="eventMeta" class="event-meta"></div><p id="eventDescription"></p>
<form id="registrationForm"><div class="form-grid">
<label>First Name<input name="firstName" required maxlength="80" autocomplete="given-name"></label>
<label>Last Name<input name="lastName" required maxlength="80" autocomplete="family-name"></label>
<label>NMLS ID<input name="nmlsId" required maxlength="40" inputmode="numeric"></label>
<label>Phone Number<input name="phone" type="tel" required maxlength="40" autocomplete="tel"></label>
<label class="full">Email<input name="email" type="email" required maxlength="150" autocomplete="email"></label>
<label class="full">Which West Capital team member invited you?<select id="recruiterId" name="recruiterId" required disabled><option value="">Loading team members…</option></select></label>
</div><button id="registerButton" class="button" type="submit" disabled>Register</button><p id="formMessage" class="message" aria-live="polite"></p></form></div>
<div id="eventError" class="error-panel" hidden></div></section></main>
<script>
const q=new URLSearchParams(location.search).get('slug')||'';const p=location.pathname.split('/').filter(Boolean);const slug=(q||(p[0]==='event'?p[1]||'':'')).trim();
const loading=document.getElementById('eventLoading'),content=document.getElementById('eventContent'),errorBox=document.getElementById('eventError'),form=document.getElementById('registrationForm'),message=document.getElementById('formMessage'),select=document.getElementById('recruiterId'),button=document.getElementById('registerButton');
async function getJson(url,options={}){const r=await fetch(url,options);let d={};try{d=await r.json()}catch{}if(!r.ok)throw new Error(d.error||'The request could not be completed.');return d}
async function load(){if(!slug)throw new Error('This event link is missing an event name.');const [ed,rd]=await Promise.all([getJson(`/.netlify/functions/events?slug=${encodeURIComponent(slug)}`),getJson(`/.netlify/functions/referrers?slug=${encodeURIComponent(slug)}`)]);const e=ed.event;document.title=`${e.name} Registration`;document.getElementById('eventName').textContent=e.name;document.getElementById('eventMeta').textContent=[e.date,e.time,e.location].filter(Boolean).join(' • ');document.getElementById('eventDescription').textContent=e.description||'';const rs=rd.recruiters||[];if(!rs.length)throw new Error('No West Capital team members have been assigned to this event yet.');select.innerHTML='<option value="">Select who invited you</option>'+rs.map(r=>`<option value="${r.id}">${r.name}</option>`).join('');select.disabled=false;button.disabled=false;loading.hidden=true;content.hidden=false}
form.addEventListener('submit',async ev=>{ev.preventDefault();if(!form.reportValidity())return;message.className='message';message.textContent='Submitting…';button.disabled=true;try{const data=await getJson(`/.netlify/functions/registrations?slug=${encodeURIComponent(slug)}`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(form).entries()))});form.reset();message.className='message success';message.textContent=data.message||'You’re registered!'}catch(e){message.className='message error';message.textContent=e.message}finally{button.disabled=false}});
load().catch(e=>{loading.hidden=true;content.hidden=true;errorBox.hidden=false;errorBox.textContent=e.message});
</script></body></html>
